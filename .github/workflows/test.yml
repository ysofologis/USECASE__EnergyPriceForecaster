name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run feature tests
        run: |
          . .venv/bin/activate
          pytest tests/test_features.py -v --tb=short

      - name: Run model tests
        run: |
          . .venv/bin/activate
          pytest tests/test_models.py -v --tb=short --timeout=600

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install linting tools
        run: pip install ruff pylint

      - name: Run ruff format check
        run: ruff format --diff src/ tests/

      - name: Run ruff lint
        run: ruff check src/ tests/

      - name: Run pylint
        run: pylint src/gridprice/ --disable=C,R,W0611 --max-line-length=100 || true
